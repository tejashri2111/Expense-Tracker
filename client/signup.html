<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Expense Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-container">

        <div class="auth-logo">💰</div>
        <h1>Create Account</h1>
            <p class="subtitle">Start managing your expenses smarter.</p>

            <form id="signupForm">

                <div class="form-group">
                    <label for="name"><i class="fa-solid fa-user"></i>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email"><i class="fa-solid fa-envelope"></i>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <button type="submit" class="auth-btn"><i class="fa-solid fa-user-plus"></i>Create Account</button>

                <p class="bottom-text">
                    Already have an account?
                    <a href="login.html">Login</a>
                </p>

            </form>

        </div>

    </div>

    <script src="js/signup.js"></script>

</body>

</html>
