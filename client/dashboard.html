<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2 class="logo">Expense<br>Tracker</h2>

        <ul class="menu">

            <li class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li>
                <i class="fa-solid fa-wallet"></i>
                Transactions
            </li>

            <li>
                <i class="fa-solid fa-chart-pie"></i>
                Reports
            </li>

            <li id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <!-- Header -->

        <div class="topbar">

            <div>

                <h2 id="welcomeUser"></h2>

                <h1>Expense Tracker</h1>

            </div>

            <input
                type="text"
                id="search"
                placeholder="Search Transaction">

        </div>

        <!-- Summary -->

        <div class="summary">

            <div class="card">

                <h3><i class="fa-solid fa-wallet"></i> Balance</h3>

                <h2 id="balance">₹0</h2>

            </div>

            <div class="card">

                <h3><i class="fa-solid fa-arrow-trend-up"></i> Income</h3>

                <h2 id="income">₹0</h2>

            </div>

            <div class="card">

                <h3><i class="fa-solid fa-arrow-trend-down"></i> Expense</h3>

                <h2 id="expense">₹0</h2>

            </div>

        </div>

        <!-- Add + Chart -->

        <div class="content">

            <div class="add-transaction">

                <h2>

                    <i class="fa-solid fa-circle-plus"></i>

                    Add Transaction

                </h2>

                <input
                    type="text"
                    id="title"
                    placeholder="Transaction Title">

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount">

                <input
                    type="date"
                    id="date">

                <select id="type">

                    <option value="income">Income</option>

                    <option value="expense">Expense</option>

                </select>

                <select id="category">

                    <option value="Salary">Salary</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Other">Other</option>

                </select>

                <button id="addBtn">

                    Add Transaction

                </button>

            </div>

            <div class="chart-box">

                <canvas id="expenseChart"></canvas>

            </div>

        </div>

        <!-- Transactions -->

        <div class="transactions">

            <h2>
                <i class="fa-solid fa-clock-rotate-left"></i>
                Transaction History
            </h2>

            <p id="loading">Loading transactions...</p>

            <ul id="transactionList"></ul>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
